name: Build and Deploy to Digital Ocean

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp docker-compose.prod.yml deploy/
          cp nginx.conf deploy/

      - name: Deploy to Digital Ocean Droplet
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            # Create application directory if it doesn't exist
            mkdir -p ~/goldsushi
            cd ~/goldsushi
            
            # Create environment file if PRODUCTION_ENV secret is set
            if [ ! -f .env ]; then
              echo "Creating .env file from secret..."
              cat > .env << 'EOF'
            ${{ secrets.PRODUCTION_ENV }}
            EOF
            fi
            
            # Login to GitHub Container Registry
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # Set image name
            export DOCKER_REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_TAG="latest"
            
            # Pull latest image
            echo "Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || exit 1
            
            # Stop old containers (but keep database data)
            echo "Stopping old containers..."
            docker-compose -f docker-compose.prod.yml down --remove-orphans || true
            
            # Start new containers
            echo "Starting new containers..."
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wait for application to be ready
            echo "Waiting for application to start..."
            sleep 15
            
            # Check if services are running
            docker-compose -f docker-compose.prod.yml ps
            
            # Test health endpoint
            for i in {1..10}; do
              if curl -f http://localhost:4200/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                break
              fi
              echo "Waiting for health check... ($i/10)"
              sleep 5
            done
            
            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -f
            
            echo "🎉 Deployment completed successfully!"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*"
          target: "~/goldsushi"
          strip_components: 1

      - name: Verify Deployment
        if: secrets.DOMAIN_URL != ''
        run: |
          echo "Verifying deployment..."
          sleep 5
          # Try health check (adjust URL if needed)
          curl -f ${{ secrets.DOMAIN_URL }}/api/health || echo "⚠️ Health check failed, but deployment completed"

      - name: Deployment Summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Status:** Deployment successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Deployment failed!" >> $GITHUB_STEP_SUMMARY
          fi

