version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: goldsushi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-goldsushi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goldsushi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goldsushi-app
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: production
      PORT: 4200
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-goldsushi}
      FORTEND_URL: ${FORTEND_URL}
      JWT_ACCESS: ${JWT_ACCESS}
      JWT_REFRESH: ${JWT_REFRESH}
      JWT_ACCESS_MAX_AGE: ${JWT_ACCESS_MAX_AGE:-3600}
      JWT_REFRESH_MAX_AGE: ${JWT_REFRESH_MAX_AGE:-604800}
      GC_KEYPATH: ${GC_KEYPATH}
      GC_PROJECT: ${GC_PROJECT}
      GC_BUCKET: ${GC_BUCKET}
      LIQPAY_PUBLIC: ${LIQPAY_PUBLIC}
      LIQPAY_PRIVATE: ${LIQPAY_PRIVATE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goldsushi-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4200/api', (r) => {process.exit(r.statusCode === 404 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: goldsushi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - goldsushi-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local

networks:
  goldsushi-network:
    driver: bridge

