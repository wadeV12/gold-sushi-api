version: '3.8'

services:
  # NestJS Application - Production
  app:
    image: ${DOCKER_REGISTRY:-ghcr.io/yourusername}/goldsushi:${IMAGE_TAG:-latest}
    container_name: goldsushi-app
    restart: always
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: production
      PORT: 4200
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      FORTEND_URL: ${FORTEND_URL}
      JWT_ACCESS: ${JWT_ACCESS}
      JWT_REFRESH: ${JWT_REFRESH}
      JWT_ACCESS_MAX_AGE: ${JWT_ACCESS_MAX_AGE:-3600}
      JWT_REFRESH_MAX_AGE: ${JWT_REFRESH_MAX_AGE:-604800}
      GC_KEYPATH: ${GC_KEYPATH}
      GC_PROJECT: ${GC_PROJECT}
      GC_BUCKET: ${GC_BUCKET}
      LIQPAY_PUBLIC: ${LIQPAY_PUBLIC}
      LIQPAY_PRIVATE: ${LIQPAY_PRIVATE}
    networks:
      - goldsushi-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4200/api', (r) => {process.exit(r.statusCode === 404 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: goldsushi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - goldsushi-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx_cache:
    driver: local

networks:
  goldsushi-network:
    driver: bridge

